jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator

      - name: Build
        run: |
          chmod +x run_verl.sh
          ./run_verl.sh

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: sim
          path: build/
